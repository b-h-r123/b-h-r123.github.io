<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | BHR</title>
    <style>
        :root {
            /* 调整为更深邃的背景色，以衬托玻璃质感 */
            --bg-gradient: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            --accent-color: #58a6ff;
            --glass-bg: rgba(22, 27, 34, 0.7); /* 半透明背景 */
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止背景装饰溢出 */
        }

        /* 增加一些背景装饰物，强化玻璃的透视感 */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 50px 30px;
            
            /* 核心：玻璃拟态效果 */
            background: var(--glass-bg);
            backdrop-filter: blur(12px); /* 背景模糊 */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            
            transition: transform 0.3s ease;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            padding: 5px; /* 留白产生呼吸感 */
            background: linear-gradient(45deg, var(--accent-color), transparent);
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-img:hover {
            transform: rotate(10deg) scale(1.05);
        }

        h1 { font-size: 1.6rem; margin: 10px 0; letter-spacing: 1px; }
        p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 30px; }

        .tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 35px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--accent-color);
            border: 1px solid rgba(88, 166, 255, 0.3);
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(88, 166, 255, 0.2);
            transform: translateY(-2px);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            font-weight: 500;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 悬停效果 */
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 点击反馈效果：缩放 */
        .link-btn:active {
            transform: translateY(0) scale(0.97);
            background: rgba(255, 255, 255, 0.12);
        }

        .highlight {
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.1);
        }

        footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #484f58;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.com/b-h-r123.png" alt="Profile" class="profile-img">

    <h1>你好，我是 BHR</h1>
    <p>探索有意思的科技与开发的大学生</p>

    <div class="tags">
        <span class="tag">Aerospace</span>
        <span class="tag">Godot</span>
        <span class="tag">Unity</span>
        <span class="tag">Arduino</span>
    </div>

    <div class="links">
        <a href="https://github.com/b-h-r123" class="link-btn highlight" target="_blank">
            <span>🐙 GitHub Home Page</span>
        </a>
        <a href="#" class="link-btn">🎮 Game Works</a>
        <a href="mailto:yxx0012230821@163.com" class="link-btn">📧 Contact Me</a>
    </div>

    <footer>
        &copy; 2026 Crafted by BHR
    </footer>
</div>

</body>
</html>
