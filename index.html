<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | BHR</title>
    <style>
        :root {
            /* 2001太空漫游风格色彩体系 */
            --bg-color: #030508;
            --accent-color: #58a6ff;
            --hal-red: #ff3333;
            --glass-bg: rgba(10, 14, 20, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            /* 引入更具现代科技感的字体族 */
            font-family: "Segoe UI Light", "Helvetica Neue", "Century Gothic", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            perspective: 1000px;
        }

        /* --- 背景图片配置 --- */
        .spaceship-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            /* 🎨 这里直接读取同级目录下的图片 */
            background: url('bg-space.jpg') no-repeat center center;
            background-size: cover;
            /* 电影感调色：调暗背景以凸显前端玻璃面板，并加入一丝冷色调 */
            filter: brightness(0.35) contrast(1.1); 
        }

        /* HAL 9000 经典的红色光晕，与背景图叠加融合，科幻感拉满 */
        .hal-eye {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.12) 0%, rgba(255, 102, 0, 0.03) 50%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            animation: hal-glow 6s infinite ease-in-out;
        }
        @keyframes hal-glow {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.8; transform: translateX(-50%) scale(1.08); }
        }

        /* --- 主容器：精准锁定 530px 宽度 --- */
        .card-wrapper {
            position: relative;
            padding: 1px; 
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.02));
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            transition: transform 0.1s ease-out;
            will-change: transform;
            width: 90%;
            max-width: 530px; /* 完美契合 530px 宽度 */
        }

        .container {
            padding: 45px 35px;
            box-sizing: border-box;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 19px;
            text-align: center;
        }

        /* 头像与个人信息 */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 5px; 
            background: linear-gradient(135deg, var(--accent-color), var(--hal-red));
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .profile-img:hover {
            transform: scale(1.06) rotate(8deg);
        }

        h1 { 
            font-size: 1.65rem; 
            margin: 15px 0 8px 0; 
            letter-spacing: 2px; 
            font-weight: 400;
        }
        .subtitle { 
            color: var(--text-dim); 
            font-size: 0.92rem; 
            margin-bottom: 30px; 
            letter-spacing: 0.5px;
        }

        /* --- 标签字体及样式高级化修改 --- */
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .tag {
            background: rgba(255, 255, 255, 0.02);
            padding: 5px 14px;
            border-radius: 4px; /* 稍微硬朗的微小弧度 */
            font-size: 0.75rem;
            /* 采用时尚、高冷的科幻无衬线字体，大写更具高级感 */
            font-family: "Eurostile", "Futura", "Segoe UI", sans-serif;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            color: #d1d5db;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tag:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(88, 166, 255, 0.08);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.25);
            transform: translateY(-2px);
        }

        /* --- 链接控制台 --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .link-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .link-btn::after {
            content: '→';
            opacity: 0.4;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .link-btn:hover::after {
            transform: translateX(4px);
            opacity: 1;
        }
        /* 悬停高光扫掠 */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-30deg);
        }
        .link-btn:hover::before {
            left: 130%;
            transition: left 0.7s ease-in-out;
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .link-btn:active {
            transform: scale(0.99) translateY(-1px);
            background: rgba(255, 255, 255, 0.08);
        }

        .highlight {
            border: 1px solid rgba(88, 166, 255, 0.35);
            background: rgba(88, 166, 255, 0.02);
        }
        .highlight:hover {
            border-color: var(--accent-color);
            background: rgba(88, 166, 255, 0.08);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.15);
        }

        footer {
            margin-top: 40px;
            font-size: 0.72rem;
            color: #484f58;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- 飞船舱室背景图层 -->
<div class="spaceship-bg"></div>
<div class="hal-eye"></div>

<!-- 精准 530px 宽度的终端面板 -->
<div class="card-wrapper" id="tiltCard">
    <div class="container">
        
        <img src="https://github.com/b-h-r123.png" alt="Profile" class="profile-img">
        <h1>你好，我是 BHR</h1>
        <div class="subtitle">探索有意思的科技与开发的大学生</div>

        <!-- 优化字体的科技感标签 -->
        <div class="tags">
            <span class="tag">Aerospace</span>
            <span class="tag">Godot</span>
            <span class="tag">Unity</span>
            <span class="tag">Arduino</span>
        </div>

        <!-- 交互链接 -->
        <div class="links">
            <a href="https://github.com/b-h-r123" class="link-btn highlight" target="_blank">
                <span>🐙 GitHub Home Page</span>
            </a>
            <a href="#" class="link-btn">🎮 Game Works</a>
            <a href="mailto:yxx0012230821@163.com" class="link-btn">📧 Contact Me</a>
        </div>

        <footer>
            &copy; 2026 Crafted by BHR // SYS ACTIVE
        </footer>
    </div>
</div>

<script>
    // 鼠标悬浮 3D 倾斜交互
    const card = document.getElementById('tiltCard');
    const containerBody = document.body;

    containerBody.addEventListener('mousemove', (e) => {
        const x = e.clientX;
        const y = e.clientY;
        
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        // 530px 尺寸下，6度的最大倾斜角能够呈现最灵动细腻的悬浮感
        const rotateX = ((centerY - y) / centerY) * 6;
        const rotateY = ((x - centerX) / centerX) * 6;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    containerBody.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        card.style.transition = 'transform 0.6s ease';
    });
    
    card.addEventListener('mouseenter', () => {
        card.style.transition = 'transform 0.1s ease-out';
    });
</script>

</body>
</html>
