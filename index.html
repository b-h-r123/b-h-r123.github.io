<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | BHR</title>
    <style>
        :root {
            /* 2001太空漫游风格：极冷灰黑、深邃暗蓝、以及经典的 HAL 9000 发光红 */
            --bg-color: #030508;
            --accent-color: #58a6ff;
            --hal-red: #ff3333;
            --glass-bg: rgba(10, 14, 20, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            perspective: 1200px;
        }

        /* --- 纯 CSS 打造：Discovery One 飞船内舱与 HAL9000 意象背景 --- */
        .spaceship-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            background: 
                /* 模拟飞船走廊的纵深透视网格线 */
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px) 0 0 / 50px 50px,
                /* 飞船舱室的结构光影 */
                radial-gradient(circle at 50% 50%, transparent 30%, #000 80%);
        }

        /* HAL 9000 经典的红色摄像眼（氛围灯效） */
        .hal-eye {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.15) 0%, rgba(255, 102, 0, 0.05) 40%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            animation: hal-glow 6s infinite ease-in-out;
        }
        @keyframes hal-glow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.9; transform: translateX(-50%) scale(1.1); }
        }

        /* --- 主容器：拓宽至 700px 并改为现代双栏/宽屏布局 --- */
        .card-wrapper {
            position: relative;
            padding: 1px; 
            border-radius: 16px;
            /* 飞船仪表盘质感的微弱外框 */
            background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.02));
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.05);
            transition: transform 0.1s ease-out;
            will-change: transform;
            width: 90%;
            max-width: 750px; /* 显着加宽 */
        }

        .container {
            padding: 45px 40px;
            box-sizing: border-box;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 15px;
            
            /* 引入 Grid 布局，将主体分为左右两部分 */
            display: grid;
            grid-template-columns: 1.2s 1.8fr;
            gap: 40px;
            align-items: center;
        }

        /* 当屏幕较小时自动切换回单栏，保证手机端完美显示 */
        @media (max-width: 650px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 40px 24px;
                text-align: center;
            }
            .left-panel { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 20px; }
        }

        /* 左侧面板：个人信息 */
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 4px; 
            background: linear-gradient(135deg, var(--accent-color), var(--hal-red));
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .profile-img:hover {
            transform: scale(1.08) rotate(5deg);
        }

        h1 { font-size: 1.7rem; margin: 20px 0 10px 0; letter-spacing: 1px; font-weight: 600; }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; margin: 0; line-height: 1.5; }

        /* 右侧面板：标签与链接终端 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 标签：更具仪表盘按钮质感 */
        .tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 16px;
            border-radius: 6px; /* 稍微方正一点，更有工业/科学仪器的硬朗感 */
            font-size: 0.75rem;
            color: #c9d1d9;
            font-family: "Courier New", Courier, monospace; /* 代码/仪器风格字体 */
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.25s ease;
        }
        .tag:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(88, 166, 255, 0.05);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 链接按钮：太空舱控制面板风格 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .link-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between; /* 两端对齐，更显大气 */
            align-items: center;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        /* 右侧加一个小箭头提示 */
        .link-btn::after {
            content: '→';
            font-family: monospace;
            opacity: 0.5;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .link-btn:hover::after {
            transform: translateX(4px);
            opacity: 1;
        }
        /* 悬停高光扫掠 */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-30deg);
        }
        .link-btn:hover::before {
            left: 130%;
            transition: left 0.7s ease-in-out;
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .link-btn:active {
            transform: scale(0.99);
            background: rgba(255, 255, 255, 0.08);
        }

        .highlight {
            border: 1px solid rgba(88, 166, 255, 0.4);
            background: rgba(88, 166, 255, 0.03);
        }
        .highlight:hover {
            border-color: var(--accent-color);
            background: rgba(88, 166, 255, 0.08);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.15);
        }

        footer {
            grid-column: 1 / -1; /* 横跨两栏 */
            margin-top: 20px;
            font-size: 0.75rem;
            color: #484f58;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<!-- 飞船走廊与 HAL9000 光效背景 -->
<div class="spaceship-bg"></div>
<div class="hal-eye"></div>

<!-- 拓宽后的 3D 终端卡片 -->
<div class="card-wrapper" id="tiltCard">
    <div class="container">
        
        <!-- 左栏：身份舱 -->
        <div class="left-panel">
            <img src="https://github.com/b-h-r123.png" alt="Profile" class="profile-img">
            <h1>BHR</h1>
            <p class="subtitle">探索有意思的科技与开发的大学生</p>
        </div>

        <!-- 右栏：控制台 -->
        <div class="right-panel">
            <div class="tags">
                <span class="tag">[ Aerospace ]</span>
                <span class="tag">[ Godot ]</span>
                <span class="tag">[ Unity ]</span>
                <span class="tag">[ Arduino ]</span>
            </div>

            <div class="links">
                <a href="https://github.com/b-h-r123" class="link-btn highlight" target="_blank">
                    <span>🐙 GitHub Home Page</span>
                </a>
                <a href="#" class="link-btn">🎮 Game Works</a>
                <a href="mailto:yxx0012230821@163.com" class="link-btn">📧 Contact Me</a>
            </div>
        </div>

        <!-- 底部信息 -->
        <footer>
            SYSTEM STATUS: ONLINE // &copy; 2026 Crafted by BHR
        </footer>
    </div>
</div>

<script>
    // 灵动的鼠标悬浮 3D 倾斜交互
    const card = document.getElementById('tiltCard');
    const containerBody = document.body;

    containerBody.addEventListener('mousemove', (e) => {
        const x = e.clientX;
        const y = e.clientY;
        
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        // 针对加宽后的卡片，适当减小Y轴旋转敏感度，让大卡片倾斜显得更沉稳、厚重
        const rotateX = ((centerY - y) / centerY) * 5;
        const rotateY = ((x - centerX) / centerX) * 5;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    containerBody.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        card.style.transition = 'transform 0.6s ease';
    });
    
    card.addEventListener('mouseenter', () => {
        card.style.transition = 'transform 0.1s ease-out';
    });
</script>

</body>
</html>
